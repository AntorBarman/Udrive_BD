<!-- Login Modal -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Login to Udrive</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Phone</label>
                    <input type="text" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                    <button type="button" class="show-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <div class="form-footer">
                    <a href="forgot-password.html">Forgot Password?</a>
                    <span>New user? <a href="register.html">Sign Up</a></span>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal" id="successModal">
    <div class="modal-content">
        <div class="modal-body text-center">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Success!</h3>
            <p id="successMessage">Operation completed successfully</p>
            <button class="btn btn-primary" id="closeSuccessModal">OK</button>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div class="modal" id="errorModal">
    <div class="modal-content">
        <div class="modal-body text-center">
            <div class="error-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h3>Error!</h3>
            <p id="errorMessage">Something went wrong</p>
            <button class="btn btn-primary" id="closeErrorModal">OK</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div class="modal" id="confirmModal">
    <div class="modal-content">
        <div class="modal-body text-center">
            <div class="confirm-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3>Are you sure?</h3>
            <p id="confirmMessage">This action cannot be undone</p>
            <div class="confirm-buttons">
                <button class="btn btn-outline" id="cancelConfirm">Cancel</button>
                <button class="btn btn-primary" id="confirmAction">Confirm</button>
            </div>
        </div>
    </div>
</div>
